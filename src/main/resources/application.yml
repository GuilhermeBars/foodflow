spring:
  application:
    name: foodflow
  datasource:
    url: jdbc:h2:mem:foodflow;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Perfil padrao: banco em memoria (H2 + console), pronto para `./mvnw spring-boot:run`.
---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${FOODFLOW_DB_URL:jdbc:postgresql://localhost:5432/foodflow}
    username: ${FOODFLOW_DB_USER:foodflow}
    password: ${FOODFLOW_DB_PASSWORD:foodflow}
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
